name: CI

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: keel
          POSTGRES_PASSWORD: keel
          POSTGRES_DB: keel
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keel"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://keel:keel@localhost:5432/keel

    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # dbt-core caps pathspec <0.13 while mypy needs >=1.0 — the constraints
      # don't intersect, so dbt cannot share Keel's environment. Keel never
      # imports dbt (it's invoked as a subprocess behind a port), so we install
      # it in its own isolated venv via pipx and expose only the `dbt` binary.
      - name: Install dbt toolchain (isolated from Keel's environment)
        run: |
          pipx install dbt-core
          pipx inject dbt-core dbt-duckdb
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Apply migrations
        run: alembic upgrade head

      - name: Run the gate
        run: make check
